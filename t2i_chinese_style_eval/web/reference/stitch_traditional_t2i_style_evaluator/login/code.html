<!-- Login Container -->
<main class="z-10 w-full max-w-md px-margin-mobile md:px-0">
<!-- Brand Identity -->
<div class="flex flex-col items-center mb-12 float-anim">
<div class="seal-logo mb-6">
                墨
            </div>
<h1 class="font-display-lg text-display-lg text-primary tracking-tighter">SumiRate</h1>
<p class="font-label-sm text-label-sm text-secondary uppercase mt-2 tracking-[0.2em]">Quality Recognition System</p>
</div>
<!-- Auth Card -->
<div class="bg-surface-container-low border border-outline-variant/30 p-10 md:p-12 relative overflow-hidden group">
<!-- Decorative Ink Corner -->
<div class="absolute -top-12 -right-12 w-24 h-24 rounded-full bg-primary/5 blur-2xl group-hover:bg-primary/10 transition-all duration-700"></div>
<div class="relative z-10">
<h2 class="font-headline-md text-headline-md text-on-surface mb-8 border-b border-outline-variant/20 pb-4">
                    进入工作室 <span class="text-secondary font-label-sm ml-2 text-sm opacity-50">/ ACCESS</span>
</h2>
<form action="#" class="space-y-8" onsubmit="return false;">
<!-- Username / Reviewer ID -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-2" for="reviewer-id">
<span class="material-symbols-outlined text-[16px]">person_check</span>
                            审查者身份标识 / IDENTITY
                        </label>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b border-outline-variant py-3 px-1 text-on-surface font-body-md ink-bleed-focus transition-all duration-300 placeholder:text-outline-variant/50" id="reviewer-id" placeholder="请输入审查者编号" type="text"/>
</div>
<!-- Password / Access Token -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-2" for="access-token">
<span class="material-symbols-outlined text-[16px]">key</span>
                            通行令牌 / ACCESS TOKEN
                        </label>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b border-outline-variant py-3 px-1 text-on-surface font-body-md ink-bleed-focus transition-all duration-300 placeholder:text-outline-variant/50" id="access-token" placeholder="••••••••" type="password"/>
</div>
<!-- Primary Action -->
<div class="pt-4">
<button class="w-full py-4 bg-primary text-on-primary font-body-lg text-body-lg flex items-center justify-center gap-3 hover:bg-on-surface-variant active:opacity-90 transition-all duration-500 group">
<span>进入工作室</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_right_alt</span>
</button>
</div>
</form>

<a class="hover:text-primary transition-colors border-b border-transparent hover:border-primary pb-0.5" href="#">故障申报</a>
</div>
</div>

</main>
<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('input');
            const submitBtn = document.querySelector('button');

            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    const label = input.previousElementSibling;
                    label.classList.add('text-primary');
                });
                input.addEventListener('blur', () => {
                    const label = input.previousElementSibling;
                    label.classList.remove('text-primary');
                });
            });

            // Mock interaction for 'Enter Studio'
            submitBtn.addEventListener('click', (e) => {
                e.preventDefault();
                submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
                setTimeout(() => {
                    submitBtn.innerHTML = '认证中...';
                    setTimeout(() => {
                        submitBtn.innerHTML = '欢迎回来';
                        submitBtn.classList.add('bg-on-surface-variant');
                    }, 1000);
                }, 800);
            });
        });
    </script>
